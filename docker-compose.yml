version: '3.8'

services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://python:8000
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      - python
    restart: unless-stopped

  python:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHON_ENV=production
      - UPLOAD_DIR=/app/uploads
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  uploads:
    driver: local